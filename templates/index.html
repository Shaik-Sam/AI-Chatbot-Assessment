<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="AI Chatbot - Conversational assistant powered by OpenAI">
    <title>AI Chatbot</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <button class="new-chat-btn" id="newChatBtn" type="button">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                    New Chat
                </button>
            </div>
            <div class="sidebar-info">
                <p class="model-badge">{{ model }}</p>
                {% if not configured %}
                <p class="config-warning">API key not configured</p>
                {% endif %}
            </div>
        </aside>

        <main class="chat-main">
            <header class="chat-header">
                <button class="menu-toggle" id="menuToggle" type="button" aria-label="Toggle menu">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="3" y1="12" x2="21" y2="12"></line>
                        <line x1="3" y1="6" x2="21" y2="6"></line>
                        <line x1="3" y1="18" x2="21" y2="18"></line>
                    </svg>
                </button>
                <h1 class="chat-title">AI Assistant</h1>
                <button class="clear-btn" id="clearBtn" type="button" aria-label="Clear conversation">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="3 6 5 6 21 6"></polyline>
                        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                    </svg>
                </button>
            </header>

            <div class="messages-container" id="messagesContainer">
                <div class="welcome-screen" id="welcomeScreen">
                    <div class="welcome-icon">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                        </svg>
                    </div>
                    <h2>How can I help you today?</h2>
                    <p>Ask me anything. I remember our conversation context.</p>
                    <div class="suggestion-chips">
                        <button class="chip" type="button" data-prompt="Explain machine learning in simple terms">Machine Learning basics</button>
                        <button class="chip" type="button" data-prompt="Write a Python function to reverse a string">Python code help</button>
                        <button class="chip" type="button" data-prompt="What are best practices for REST API design?">API design tips</button>
                        <button class="chip" type="button" data-prompt="Help me plan a productive daily schedule">Productivity tips</button>
                    </div>
                </div>
            </div>

            <div class="input-area">
                <form class="input-form" id="chatForm">
                    <div class="input-wrapper">
                        <textarea
                            id="messageInput"
                            placeholder="Message AI Assistant..."
                            rows="1"
                            maxlength="4000"
                            autocomplete="off"
                        ></textarea>
                        <button class="send-btn" id="sendBtn" type="submit" disabled aria-label="Send message">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <line x1="22" y1="2" x2="11" y2="13"></line>
                                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                            </svg>
                        </button>
                    </div>
                    <p class="input-hint">AI can make mistakes. Verify important information.</p>
                </form>
            </div>
        </main>
    </div>

    <div class="overlay" id="overlay"></div>

    <script src="/static/js/chat.js"></script>
</body>
</html>
